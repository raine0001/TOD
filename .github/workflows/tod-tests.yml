name: TOD Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: tod-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PowerShell Test Dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          $legacyPester = @(Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version.Major -eq 4 })
          if (@($legacyPester).Count -eq 0) {
            Install-Module -Name Pester -RequiredVersion 4.10.1 -Scope CurrentUser -Force -SkipPublisherCheck
          }
          Get-Module -ListAvailable -Name Pester | Sort-Object Version -Descending | Select-Object -First 5 Name,Version,Path

      - name: Run TOD Test Suite
        shell: pwsh
        run: |
          ./scripts/Invoke-TODTests.CI.ps1 -SummaryPath "tod/out/results-v2/tod-tests-summary.json"

      - name: Upload TOD Test Summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tod-tests-summary
          path: tod/out/results-v2/tod-tests-summary.json
          if-no-files-found: warn

      - name: Upload TOD Test Trends
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tod-tests-trends
          path: |
            tod/out/results-v2/tod-tests-history.json
            tod/out/results-v2/tod-tests-trends.json
          if-no-files-found: warn
